<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101114">
    <title>Arcade - Prototype</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="game-stage" aria-label="Zone de jeu">
        <canvas id="game" width="480" height="840" aria-label="Prototype de jeu d'arcade"></canvas>

        <div class="hud" aria-live="polite">
          <div>
            <span class="hud-label">Score</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span class="hud-label">Niveau</span>
            <strong id="level">1</strong>
          </div>
          <div>
            <span class="hud-label">Vies</span>
            <strong id="lives">3</strong>
          </div>
        </div>

        <button id="startButton" class="start-button" type="button">
          Jouer
        </button>
      </section>

      <aside class="score-panel" aria-label="Tableau des scores">
        <div class="score-panel-header">
          <h2>Scores</h2>
          <label class="memory-toggle">
            <input id="memoryToggle" type="checkbox">
            <span>Memoire</span>
          </label>
        </div>

        <ol id="scoreList" class="score-list"></ol>

        <button id="clearScoresButton" class="clear-scores-button" type="button">
          Effacer
        </button>
      </aside>
    </main>

    <script src="game.js"></script>
  </body>
</html>
